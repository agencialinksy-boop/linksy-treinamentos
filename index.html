<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linksy Treinamentos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .bg-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(130px, 20vw, 240px);
      font-weight: 900;
      color: rgba(120,10,35,0.35);
      letter-spacing: 0.08em;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      z-index: 0;
    }
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: #d11550;
      opacity: 0;
      animation: float-p linear infinite;
    }
    @keyframes float-p {
      0%   { opacity: 0; transform: translateY(0) translateX(0); }
      20%  { opacity: 0.5; }
      80%  { opacity: 0.15; }
      100% { opacity: 0; transform: translateY(-500px) translateX(var(--dx)); }
    }
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 24px;
    }
    .logo-wrap {
      width: 180px;
      height: 180px;
      margin-bottom: 28px;
      opacity: 0;
      animation: logo-in 1s 0.3s cubic-bezier(0.34,1.4,0.64,1) forwards;
      filter: drop-shadow(0 0 40px rgba(209,21,80,0.6));
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      animation: float 4s ease-in-out 1.3s infinite;
    }
    @keyframes logo-in {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }
    .label {
      font-size: 11px;
      letter-spacing: 5px;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: 0;
      animation: fadein 1s 0.7s forwards;
    }
    .sub {
      font-size: 16px;
      color: rgba(255,255,255,0.45);
      line-height: 1.75;
      margin-bottom: 44px;
      opacity: 0;
      animation: fadein 1s 0.9s forwards;
    }
    .btn {
      display: inline-block;
      padding: 15px 50px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.18);
      background: transparent;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      opacity: 0;
      animation: fadein 1s 1.1s forwards;
      transition: all 0.3s;
    }
    .btn:hover {
      border-color: #d11550;
      color: #d11550;
      box-shadow: 0 0 35px rgba(209,21,80,0.2);
      transform: translateY(-2px);
    }
    @keyframes fadein { to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="bg-text">LINKSY</div>
  <div class="particles" id="pts"></div>
  <div class="content">
    <div class="logo-wrap">
      <img src="logo.png" alt="Linksy">
    </div>
    <p class="label">Plataforma de Treinamentos</p>
    <p class="sub">Domine a edicao de videos com trilhas exclusivas<br>criadas pelo time audiovisual</p>
    <a href="login.html" class="btn">Entrar na plataforma</a>
  </div>
  <script>
    const pts = document.getElementById('pts');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const s = 1.5 + Math.random() * 2;
      p.style.cssText = "left:"+Math.random()*100+"%;bottom:"+(Math.random()*10)+"%;width:"+s+"px;height:"+s+"px;--dx:"+((Math.random()-.5)*150)+"px;animation-duration:"+(5+Math.random()*6)+"s;animation-delay:"+(Math.random()*8)+"s;";
      pts.appendChild(p);
    }
  </script>
</body>
</html>
