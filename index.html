<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linksy Treinamentos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* LINKSY atras - watermark gigante */
    .bg-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(120px, 22vw, 260px);
      font-weight: 900;
      color: transparent;
      -webkit-text-stroke: 1px rgba(209,21,80,0.12);
      letter-spacing: 0.05em;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      z-index: 0;
      animation: pulse-bg 4s ease-in-out infinite;
    }
    @keyframes pulse-bg {
      0%, 100% { -webkit-text-stroke-color: rgba(209,21,80,0.10); }
      50%       { -webkit-text-stroke-color: rgba(209,21,80,0.20); }
    }

    /* particulas */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: #d11550;
      opacity: 0;
      animation: float-p linear infinite;
    }
    @keyframes float-p {
      0%   { opacity: 0;   transform: translateY(0) translateX(0); }
      20%  { opacity: 0.6; }
      80%  { opacity: 0.2; }
      100% { opacity: 0;   transform: translateY(-500px) translateX(var(--dx)); }
    }

    /* conteudo */
    .content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* logo animada */
    .logo-wrap {
      width: 130px; height: 130px;
      margin-bottom: 36px;
      opacity: 0;
      animation: logo-in 1.2s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards;
      filter: drop-shadow(0 0 30px rgba(209,21,80,0.5));
      animation-name: logo-in, logo-float;
      animation-duration: 1.2s, 4s;
      animation-delay: 0.2s, 1.4s;
      animation-timing-function: cubic-bezier(0.34,1.56,0.64,1), ease-in-out;
      animation-fill-mode: forwards, none;
      animation-iteration-count: 1, infinite;
    }
    @keyframes logo-in {
      0%   { opacity: 0; transform: scale(0.6) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes logo-float {
      0%, 100% { transform: translateY(0px); filter: drop-shadow(0 0 30px rgba(209,21,80,0.5)); }
      50%       { transform: translateY(-10px); filter: drop-shadow(0 0 40px rgba(209,21,80,0.7)); }
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }

    /* texto */
    .sub {
      font-size: clamp(15px, 2.5vw, 18px);
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
      margin-bottom: 44px;
      max-width: 440px;
      opacity: 0;
      animation: fadein 1s 0.8s forwards;
    }

    .btn {
      display: inline-block;
      padding: 16px 52px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      opacity: 0;
      animation: fadein 1s 1.1s forwards;
      transition: all 0.35s ease;
    }
    .btn:hover {
      border-color: #d11550;
      color: #d11550;
      box-shadow: 0 0 40px rgba(209,21,80,0.2);
      transform: translateY(-2px);
    }

    @keyframes fadein { to { opacity: 1; } }
  </style>
</head>
