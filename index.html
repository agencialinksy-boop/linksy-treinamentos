<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linksy Treinamentos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('FRONT2.png');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    .btn-wrap {
      position: relative;
      z-index: 1;
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
    }
    .btn {
      display: inline-block;
      padding: 16px 56px;
      border-radius: 50px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .btn:hover {
      border-color: #d11550;
      color: #d11550;
      box-shadow: 0 0 40px rgba(209,21,80,0.25);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="btn-wrap">
    <a href="login.html" class="btn">Entrar na plataforma</a>
  </div>
</body>
</html>
